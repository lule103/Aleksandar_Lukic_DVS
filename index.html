<!DOCTYPE html>
<html>
<head>
    <title>FPGA Project Tracker</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>FPGA Project Progress</h1>
        
        <!-- Project tasks -->
        <div class="task-list">
            <div class="task completed">HDL Design - Completed</div>
            <div class="task in-progress">Synthesis - In Progress</div>
            <div class="task pending">Timing Closure - Pending</div>
            <div class="task pending">Verification - Pending</div>
        </div>
        
        <!-- Current status -->
        <div class="status">
            <h2>Current Status</h2>
            <p>Progress: <span class="progress-bar">████░░░░░░</span> 40%</p>
        </div>
    </div>
</body>
</html>
